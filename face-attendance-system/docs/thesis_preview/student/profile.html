<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学生端登录与个人中心</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 92%</span>
      </div>
      <div class="screen">
        <div class="hero">
          <h1>个人中心</h1>
          <p>微信登录完成后即可读取用户资料、跳转人脸注册并切换运行环境。</p>
        </div>

        <div class="card">
          <div class="name">Carter-001</div>
          <div class="meta">工号：EMP00001</div>
          <div class="meta">部门：Finance</div>
          <div class="meta">人脸状态：已注册</div>
          <div class="tag">当前环境 dev</div>
        </div>

        <div class="card actions">
          <div class="button primary">人脸注册</div>
          <div class="button secondary">刷新资料</div>
          <div class="button secondary">重新登录</div>
        </div>

        <div class="card">
          <div class="line">运行环境：dev</div>
          <div class="env-switch">切换环境 dev test prod</div>
        </div>

        <div class="footer">页面依据 miniprogram/pages/profile 实际结构生成</div>
      </div>
    </div>
  </body>
</html>
