<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学生端记录查看</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 86%</span>
      </div>
      <div class="screen">
        <div class="hero">
          <h1>签到记录</h1>
          <p>支持按日期筛选，展示签到时间、状态、匹配分和设备信息。</p>
        </div>

        <div class="card">
          <div class="head">
            <span>签到记录</span>
            <span class="date-btn">2026-03-20</span>
          </div>
        </div>

        <div class="card">
          <div class="row">时间：2026-03-20 08:03:15</div>
          <div class="row">状态：normal</div>
          <div class="row">匹配分：0.967</div>
          <div class="row">设备：Apple iPhone iOS 18.1</div>
        </div>

        <div class="card">
          <div class="row">时间：2026-03-19 08:11:42</div>
          <div class="row">状态：late</div>
          <div class="row">匹配分：0.941</div>
          <div class="row">设备：Apple iPhone iOS 18.1</div>
        </div>

        <div class="footer">页面依据 miniprogram/pages/records 实际结构生成</div>
      </div>
    </div>
  </body>
</html>
