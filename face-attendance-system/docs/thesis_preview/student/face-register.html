<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学生端人脸注册</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G 90%</span>
      </div>
      <div class="screen">
        <div class="hero">
          <h1>人脸注册</h1>
          <p>调用前置摄像头完成采集，上传后由后端做人脸检测、特征提取和模板保存。</p>
        </div>

        <div class="card">
          <div class="tips">请保持正面、光线充足，拍摄时摘下口罩。</div>
          <div class="camera"></div>
          <div class="button primary">拍照并注册</div>
        </div>

        <div class="card result">
          <div class="line">注册结果：注册成功</div>
          <div class="line">质量评分：85.89</div>
          <div class="line">后端已更新 face_data 和 user.is_face_registered</div>
        </div>

        <div class="footer">页面依据 miniprogram/pages/face-register 实际结构生成</div>
      </div>
    </div>
  </body>
</html>
