services:
  data-refresh:
    build: .
    command: python scripts/refresh_data.py --days 180
    volumes:
      - ./:/workspace

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    depends_on:
      - data-refresh

  app:
    build: .
    command: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./:/workspace
    depends_on:
      - api
